[build]
  functions = "netlify/functions"

# Firebase Web-API-Keys sind öffentlich (client-seitig gedacht) und sollen
# nicht als Secrets erkannt werden. Wir deaktivieren den Secret-Scanner für
# diese Keys explizit, damit Deploys nicht fälschlich blockiert werden.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

# Tägliches Datenbank-Backup (siehe netlify/functions/backup-database.js).
# "@daily" = einmal pro Tag um Mitternacht UTC.
[functions."backup-database"]
  schedule = "@daily"

# Tägliche Fehler-Zusammenfassung (siehe netlify/functions/error-report.js).
# "0 6 * * *" = täglich um 06:00 UTC (ca. 7-8 Uhr deutsche Zeit).
[functions."error-report"]
  schedule = "0 6 * * *"

# Sicherheits-Header für alle Seiten.
# Bewusst KEINE script-src/default-src-CSP — das würde die ~300 Inline-Skripte
# der App blockieren. Gesetzt sind nur Direktiven, die nichts brechen:
#   frame-ancestors/X-Frame-Options → Clickjacking-Schutz
#   object-src 'none'               → keine Plugins/Flash
#   base-uri 'self'                 → kein <base>-Tag-Hijacking
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Content-Security-Policy = "frame-ancestors 'self'; object-src 'none'; base-uri 'self'"

# Service Worker: NIEMALS cachen — Browser muss immer frische Version holen
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML-Seiten: immer revalidieren
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
