# CI: Tests + Syntax-Check für Pull Requests und Pushes auf main.
#
# Blockiert das Netlify-Deployment NICHT — Netlify zieht direkt vom Branch und
# baut unabhängig. CI liefert nur ein grünes/rotes Signal am Commit auf GitHub,
# damit Regressionen früh sichtbar werden.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Vitest + Function-Syntax-Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install function dependencies
        working-directory: netlify/functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run Vitest (shared modules)
        run: npm test -- --reporter=verbose

      - name: Syntax-check all Netlify Functions
        run: |
          set -e
          for f in netlify/functions/*.js; do
            echo "→ $f"
            node --check "$f"
          done

      - name: Syntax-check shared modules
        run: |
          set -e
          for f in shared/*.js; do
            echo "→ $f"
            node --check "$f"
          done

      # XSS-Regressions-Check: ungeschützte User-Input-Interpolationen in HTML-Templates.
      # Ersetzt die fehlende script-src-CSP durch maschinelle Escaping-Disziplin.
      # Blockiert die CI bei Funden (Exit 1).
      - name: XSS-Lint (ungeschützte User-Input-Interpolationen)
        run: node scripts/xss-lint.js

      # HTML-Tag-Balance-Check als Warning-only (set +e), damit grep-Mismatches den Build nicht killen.
      - name: HTML tag balance (warn-only)
        continue-on-error: true
        run: |
          set +e
          for f in index.html staff.html welcome.html impressum.html datenschutz.html; do
            if [ -f "$f" ]; then
              opens=$(grep -oE '<(div|span|button|script|style)\b' "$f" 2>/dev/null | wc -l | tr -d ' ')
              closes=$(grep -oE '</(div|span|button|script|style)>' "$f" 2>/dev/null | wc -l | tr -d ' ')
              opens=${opens:-0}; closes=${closes:-0}
              echo "$f: opens=$opens closes=$closes"
              if [ "$opens" != "$closes" ]; then
                echo "::warning file=$f::Mögliches Tag-Mismatch (opens=$opens, closes=$closes) — bitte manuell prüfen."
              fi
            fi
          done
          exit 0
