# Automatisches, versioniertes Deployment der Firebase Realtime Database Rules.
#
# Hintergrund (externes Review): Bisher wurden die Rules manuell per Copy-Paste in
# die Firebase Console eingefügt — getrennt vom Code-Deploy. Das birgt das Risiko,
# dass Code und live-aktive Rules auseinanderlaufen, ohne Versionierung.
#
# Dieser Workflow deployt database.rules.json automatisch, sobald sie sich auf
# main ändert. Damit sind die Rules versioniert (im selben Commit wie der Code)
# und der Live-Stand entspricht garantiert dem Repo.
#
# EINMALIGE EINRICHTUNG (durch Maintainer):
#   1. Google-Cloud-Service-Account-JSON besorgen (dasselbe, das in Netlify als
#      FIREBASE_SERVICE_ACCOUNT hinterlegt ist — Firebase Console → Projekt-
#      einstellungen → Dienstkonten → "Neuen privaten Schlüssel generieren").
#   2. In GitHub: Repo → Settings → Secrets and variables → Actions →
#      "New repository secret" → Name: FIREBASE_SERVICE_ACCOUNT, Wert: kompletter
#      JSON-Inhalt.
#   Solange das Secret fehlt, überspringt der Workflow den Deploy (kein roter Build).
#
# Der Service-Account braucht die Rolle "Firebase Realtime Database Admin"
# (in der Regel als "Editor" bereits enthalten).

name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'database.rules.json'
      - 'firebase.json'
      - '.github/workflows/deploy-rules.yml'
  workflow_dispatch:

jobs:
  deploy-rules:
    name: Firebase Database Rules deployen
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Java wird vom Firebase-Emulator (Rules-Verhaltenstest) benötigt.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate database.rules.json (JSON-Syntax)
        run: node -e "JSON.parse(require('fs').readFileSync('database.rules.json','utf8')); console.log('✓ database.rules.json ist valides JSON')"

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install -g firebase-tools

      # SICHERHEITS-GATE: Verhaltenstest der Rules gegen den Emulator.
      # Prüft Kern-Invarianten (Kunde kann nicht selbst freischalten, PII-Trennung,
      # Besitz-Checks, Gäste-Sperre) gegen die ECHTE database.rules.json.
      # Schlägt ein Test fehl, bricht der Job ab → KEIN Deploy. Damit kann ein
      # valides-aber-falsches Regel-JSON nicht in Produktion gelangen.
      - name: Rules-Verhaltenstest (Firebase Emulator)
        run: |
          firebase emulators:exec --only database --project demo-dassu "npm run test:rules"

      - name: Deploy Rules (nur wenn Secret gesetzt)
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT-Secret nicht gesetzt — Rules-Deploy übersprungen."
            echo "Einrichtung: siehe Kommentar oben in deploy-rules.yml."
            exit 0
          fi
          # Service-Account-JSON in temporäre Datei schreiben (von der CLI gelesen)
          echo "$SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          firebase deploy --only database \
            --project buchungskalender-ffe4c \
            --non-interactive
          rm -f "$RUNNER_TEMP/sa.json"
